name: Build Demographics Dataset

on:
  workflow_dispatch:
  push:
    paths:
      - 'data/submarkets.kml'
      - 'scripts/build_demographics.py'
      - 'requirements.txt'
      - '.github/workflows/build-demographics.yml'

jobs:
  build-demographics:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system geospatial libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev libspatialindex-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Census demographics dataset
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: |
          python scripts/build_demographics.py --kml data/submarkets.kml --output-dir output

      - name: Upload demographics outputs
        uses: actions/upload-artifact@v4
        with:
          name: gulf-coast-submarket-demographics
          path: |
            output/submarket_demographics_combined.json
            output/submarket_demographics_current_and_forecast.csv
            output/submarket_demographics_audit.csv
            output/submarket_demographics_metadata.json
          if-no-files-found: error
