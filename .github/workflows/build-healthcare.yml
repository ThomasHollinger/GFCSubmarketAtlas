name: Build Healthcare Dataset

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-healthcare:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas geopandas shapely pyogrio fiona rtree geopy

      - name: Build healthcare dataset
        run: |
          python scripts/build_healthcare.py

      - name: Commit healthcare outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/healthcare_facilities.geojson data/submarket_healthcare_summary.json data/healthcare_facility_audit.csv data/healthcare_metadata.json
          git commit -m "Build healthcare dataset" || echo "No healthcare changes to commit"
          git push
