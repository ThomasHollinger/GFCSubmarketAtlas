name: Build Builder Subdivisions Dataset

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-builder-subdivisions:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-builder-subdivisions.txt

      - name: Build builder subdivisions dataset
        run: |
          python scripts/build_builder_subdivisions.py \
            --submarkets data/submarkets.geojson \
            --targets data/builder_source_targets.json \
            --output-dir data

      - name: Commit builder subdivision outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/builder_subdivisions.geojson data/submarket_builder_summary.json data/builder_subdivision_audit.csv data/builder_subdivision_candidates.xlsx data/builder_subdivision_metadata.json
          git commit -m "Build builder subdivisions dataset" || echo "No builder subdivision changes to commit"
          git push
